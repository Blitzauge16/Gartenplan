<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Interaktive Luftbild-Map</title>
    <style>
        body {
            font-family: sans-serif;
            background: #2c3e50;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        svg {
            background-color: #34495e; /* Simulierter Hintergrund (Garten/Bäume) */
            border: 2px solid #7f8c8d;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 90%;
            height: auto;
        }
        /* Styling für die klickbaren Dach-Flächen */
        .dach-flaeche {
            fill: #c0392b; /* Rotes Ziegeldach */
            stroke: #962d22;
            stroke-width: 2;
            transition: fill 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }
        /* Visuelles Feedback bei Hover */
        .dach-flaeche:hover {
            fill: #e74c3c;
            stroke: #fff;
        }
        /* Styling für den Text (z.B. die 48) */
        .beschriftung {
            fill: white;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none; /* Klicks gehen durch den Text auf das Dach darunter */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <h1>Interaktiver Lageplan</h1>
    <p>Klicke auf eines der roten Dächer...</p>

    <svg viewBox="0 0 800 450" width="800" height="450">
        <circle cx="600" cy="250" r="40" fill="#27ae60" opacity="0.4" stroke="#2ecc71" stroke-width="2" />
        
        <g id="gebaeude-oben">
            <polygon id="haus-oben" class="dach-flaeche" points="290,15 450,15 440,75 280,75" />
            <text x="365" y="50" class="beschriftung" transform="rotate(90, 365, 50)">48</text>
        </g>

        <polygon id="hauptgebaeude-links" class="dach-flaeche" points="140,240 280,240 280,390 140,390" />
        
        <polygon id="anbau-mitte" class="dach-flaeche" points="280,390 320,390 320,450 140,450 140,390 280,390" />

        <polygon id="gebaeude-rechts" class="dach-flaeche" points="430,300 500,300 500,440 430,440" />
        
        <polygon id="anbau-rechts" class="dach-flaeche" points="500,390 530,390 530,440 500,440" />
    </svg>

    <script>
        // Event-Listener für alle Dach-Flächen registrieren
        document.querySelectorAll('.dach-flaeche').forEach(element => {
            element.addEventListener('click', function(e) {
                const id = e.target.id;
                console.log("Geklicktes Gebäude ID:", id);
                
                // Beispiel-Logik: Je nach ID eine andere Aktion ausführen
                if (id === 'haus-oben') {
                    alert("Du hast Gebäude Nr. 48 ausgewählt.");
                } else if (id === 'hauptgebaeude-links') {
                    alert("Du hast das Hauptgebäude links ausgewählt.");
                } else {
                    alert(`Gebäude "${id}" wurde angeklickt.`);
                }
                
                // Hier kannst du jetzt deinen Fetch-Aufruf ans Backend einbauen:
                /*
                fetch('/api/gebaeude-klick/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gebaeude_id: id })
                });
                */
            });
        });
    </script>
</body>
</html>
